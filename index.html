<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacraBank</title>

    <meta name="description" content="">


    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />

    <!-- Importação da fonte Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Importão de ícones-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="./images/barlleta-foco.jpg" alt="foto do cliente Barlletinha">
            <h1>Olá, <span class="nome-cliente">Barlleta</span>! Bem vindo ao Sacrabank.</h1>
        </header>
        <nav aria-label="Menu Principal">
            <ul>
                <li><a href="#home"><i class="fas fa-home"></i>Home</a></li>
                <li><a href="#extrato"><i class="fas fa-file-invoice-dollar"></i>Extrato</a></li>

                <li><a href="#pix"><i class="fas fa-qrcode"></i>Área Pix</a></li>
                <li><a href="#pagamentos"><i class="fas fa-barcode"></i>Pagamentos</a></li>
                <li><a href="#cartoes"><i class="fas fa-credit-card"></i>Cartões</a></li>

                <li><a href="#investimentos"><i class="fas fa-chart-line"></i>Investimentos</a></li>
                <li><a href="#credito"><i class="fas fa-hand-holding-dollar"></i>Empréstimos</a></li>

                <li><a href="#perfil"><i class="fas fa-user"></i>Meus Dados</a></li>
                <li><a href="#seguranca"><i class="fas fa-shield-alt"></i>Segurança</a></li>
                <li><a href="#open-finance"><i class="fas fa-landmark"></i>Open Finance</a></li>

                <li><a href="#suporte"><i class="fas fa-headset"></i>Suporte</a></li>
            </ul>
        </nav>
        <main>

            <article class="card saldo">

                <p class="card-label">Saldo</p>
                <p class="card-valor"> R$ 2.000,00</p>
            </article>
            <article class="card limite">

                <p class="card-label">Limite:</p>
                <p class="card-valor">R$: -1.500,00</p>
            </article>
            <article class="card fatura">

                <p class="card-label">Fatura:</p>
                <p class="card-valor">R$ 3.900,00</p>
            </article>

            <section class="transferencia">
                <form action="#">
                    <fieldset class="campo">
                        <legend>Transferências</legend>
                        <div class="campo-grupo">
                            <label for="valor-transferido">Valor da transferência: </label>
                            <input type="number" name="valor-transferido" id="valor-transferido"
                                placeholder="R$ 1.000,00" required>
                        </div>
                        <div class="campo-grupo">
                            <label for="chave-pix">Chave pix: </label>
                            <input type="number" name="chave-pix" id="chave-pix"
                                placeholder="R$ 1.000,00" required>
                        </div>
                        <div class="opcao-grupo">
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="PIX" required> <span>PIX</span>
                            </label>
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="TED"> <span>TED</span>
                            </label>
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="DOC"> <span>DOC</span>
                            </label>
                        </div>
                        <div class="opcao-grupo">
                            <label class="opcao-selecao">
                                <input type="checkbox" name="salvar-contato" value="salvar"> <span>Salvar este contato para
                                futuras transferências?</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-enviar">Transferir<i class="fas fa-paper-plane"></i></button>
                    </fieldset>
                </form>
            </section>
        </main>
    </div>


</body>

</html>
