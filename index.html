<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacraBank</title>

    <meta name="description" content="">


    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />

    <!-- Importação da fonte Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="./images/barlleta-foco.jpg" alt="foto do cliente Barlletinha">
            <h1>Olá, <span class="nome-cliente">Barlleta</span>! Bem vindo ao Sacrabank.</h1>
        </header>
        <nav aria-label="Menu Principal">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#extrato">Extrato</a></li>

                <li><a href="#pix">Área Pix</a></li>
                <li><a href="#pagamentos">Pagamentos</a></li>
                <li><a href="#cartoes">Cartões</a></li>

                <li><a href="#investimentos">Investimentos</a></li>
                <li><a href="#credito">Empréstimos</a></li>
                <li><a href="#planejamento">Metas</a></li>

                <li><a href="#perfil">Meus Dados</a></li>
                <li><a href="#seguranca">Segurança</a></li>
                <li><a href="#open-finance">Open Finance</a></li>

                <li><a href="#suporte">Suporte</a></li>
            </ul>
        </nav>
        <main>

            <article class="card saldo">

                <p class="card-label">Saldo</p>
                <p class="card-valor"> R$ 2.000,00</p>
            </article>
            <article class="card limite">

                <p class="card-label">Limite:</p>
                <p class="card-valor">R$: -1.500,00</p>
            </article>
            <article class="card fatura">

                <p class="card-label">Fatura:</p>
                <p class="card-valor">R$ 3.900,00</p>
            </article>

            <section class="transferencia">
                <form action="#">
                    <fieldset class="campo">
                        <legend>Transferências</legend>
                        <div class="campo-grupo">
                            <label for="valor-transferido">Valor da transferência: </label>
                            <input type="number" name="valor-transferido" id="valor-transferido"
                                placeholder="R$ 1.000,00" required>
                        </div>
                        <div class="opcao-grupo">
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="PIX" required> <span>PIX</span>
                            </label>
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="TED"> <span>TED</span>
                            </label>
                            <label class="opcao-selecao">
                                <input type="radio" name="transacao" value="DOC"> <span>DOC</span>
                            </label>
                        </div>
                        <div class="opcao-grupo">
                            <label class="opcao-selecao">
                                <input type="checkbox" name="salvar-contato" value="salvar"> <span>Salvar este contato para
                                futuras transferências?</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-enviar">Transferir</button>
                    </fieldset>
                </form>
            </section>
        </main>
    </div>


</body>

</html>
